<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>微读圣经Lite Web</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div id="app">
    <div class="topbar">
      <div class="topbar-inner">
        <button id="btnChatRoom" class="icon-btn" style="font-size: 16px;">💬</button>
        <button id="btnBack" class="icon-btn hidden">‹</button>
        <div id="topTitle" class="title">微读圣经Lite</div>
        <button id="btnHome" class="icon-btn">⌂</button>
      </div>
    </div>

    <div id="main" class="main">
      <div id="viewLoading" class="loading">正在加载圣经数据…</div>

      <div id="viewBooks" class="hidden">
        <div class="panel-card">
          <div class="section-title">请选择书卷</div>
          <div id="bookGrid" class="book-grid"></div>
        </div>
      </div>

      <div id="viewChapters" class="hidden">
        <div class="panel-card">
          <div id="chaptersTitle" class="section-title">选择章节</div>
          <div id="chapterGrid" class="chapter-grid"></div>
        </div>
      </div>

      <div id="viewReader" class="hidden reader-wrap">
        <div class="reader-head">
          <div id="readerTitle"></div>
          <div class="reader-sub">点右侧星标可收藏</div>
        </div>
        <div id="verseContainer" class="verses"></div>
      </div>

      <div id="viewFavorites" class="hidden">
        <div class="panel-card">
          <div class="section-title">我的收藏 <span id="favCountBadge" class="badge">0 条</span></div>
          <div id="favoriteList"></div>
        </div>
      </div>

      <div id="viewChat" class="hidden">
        <div id="chatLogin" class="panel-card">
          <div class="section-title">进入交流室</div>
          <div class="chat-form">
            <input type="text" id="inputRoomCode" placeholder="输入交流码 (如: 777)">
            <input type="text" id="inputNickname" placeholder="输入你的昵称">
            <button id="btnJoinChat" class="btn primary">进入房间</button>
          </div>
        </div>
        <div id="chatMain" class="hidden">
          <div id="chatBox"></div>
          <div class="chat-input-row">
            <input type="text" id="msgInput" placeholder="写下你的感悟...">
            <button id="btnSendMsg" class="btn primary">发送</button>
          </div>
        </div>
      </div>
    </div>

    <div id="toolbar" class="toolbar hidden">
      <button id="btnFavorites" class="btn primary">★ 收藏夹</button>
      <button id="btnSettings" class="btn">Aa 设置</button>
    </div>
  </div>

  <div id="settingsOverlay" class="settings-overlay"></div>
  <div id="settingsPanel" class="settings-panel">...</div>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
  <script src="chat.js"></script>
</body>
</html>
