<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>临时交流室</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 针对独立聊天页面的微调 */
        body { display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .main-chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .back-nav { padding: 10px; background: var(--card); border-bottom: 1px solid var(--line); display: flex; align-items: center; }
    </style>
</head>
<body class="theme-light">

    <div class="topbar">
        <div class="topbar-inner">
            <button onclick="window.location.href='index.html'" class="icon-btn">‹</button>
            <div class="title" id="roomTitle">交流室</div>
            <div style="width:40px"></div> </div>
    </div>

    <div class="main-chat-container">
        <div id="chatLogin" class="panel-card" style="margin: 20px;">
            <div class="section-title">加入交流</div>
            <input type="text" id="inputRoomCode" placeholder="房间号 (如: 777)" class="chat-input-base" style="width:100%; margin-bottom:10px;">
            <input type="text" id="inputNickname" placeholder="你的昵称" class="chat-input-base" style="width:100%; margin-bottom:10px;">
            <button id="btnJoinChat" class="btn primary" style="width:100%; height:45px;">进入</button>
        </div>

        <div id="chatMain" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
            <div id="chatBox"></div>
            <div class="chat-input-area">
                <input type="text" id="msgInput" placeholder="写下感悟..." class="chat-msg-input">
                <button id="btnSendMsg" class="btn primary" style="width:70px;">发送</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="chat.js"></script>
    <script>
        // 简单的 Toast 兼容逻辑
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        const $ = id => document.getElementById(id);
    </script>
</body>
</html>
